<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Secret - Studio AKASAKA</title>
  <style>
    :root {
      color-scheme: dark;
      --paper: #f4f1e8;
      --ink: rgba(244, 241, 232, .88);
      --muted: rgba(244, 241, 232, .58);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: var(--ink);
      font-family: Cambria, Times, serif;
    }

    main {
      width: min(680px, calc(100vw - 44px));
      padding: 88px 0;
    }

    h1 {
      margin: 0 0 22px;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 400;
      letter-spacing: .08em;
    }

    p {
      max-width: 42rem;
      margin: 0 0 18px;
      color: var(--muted);
      font-size: .98rem;
      line-height: 1.9;
    }

    a {
      display: inline-block;
      margin-top: 26px;
      color: var(--paper);
      text-decoration: none;
      border-bottom: 1px solid rgba(244, 241, 232, .32);
      padding-bottom: 4px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Secret Room</h1>
    <p>This quiet page is reserved for future objects, notes, and private studio experiments.</p>
    <p>The key works. The room is waiting.</p>
    <a href="../../index.html">Back to Studio AKASAKA</a>
  </main>
</body>
</html>
